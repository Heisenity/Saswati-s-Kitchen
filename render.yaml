services:
  - type: web
    name: saswatis-kitchen-web
    runtime: node
    plan: starter
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
  - type: web
    name: saswatis-kitchen-chat
    runtime: node
    plan: starter
    buildCommand: npm install && npm run prisma:generate
    startCommand: npm run start:chat
    envVars:
      - key: NODE_VERSION
        value: 20
